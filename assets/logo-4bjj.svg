<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Logo 4BJJ">
  <defs>
    <linearGradient id="brushRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b4d"/>
      <stop offset="100%" stop-color="#9d1a26"/>
    </linearGradient>
  </defs>
  <!-- Outer brushed circle (black) -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#0a0a0a" stroke-width="10"
          stroke-dasharray="520 30 35 8" stroke-linecap="round" transform="rotate(-18 100 100)"/>
  <circle cx="100" cy="100" r="88" fill="#0a0a0a" opacity="0.0"/>
  <!-- Red brushstroke arc -->
  <path d="M 30 70 A 80 80 0 0 1 170 130"
        fill="none" stroke="url(#brushRed)" stroke-width="14" stroke-linecap="round"
        opacity="0.95"/>
  <!-- Subtle brushstroke fragment -->
  <path d="M 60 158 Q 100 178 142 158" fill="none" stroke="#0a0a0a"
        stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- 4BJJ wordmark -->
  <text x="100" y="115" text-anchor="middle"
        font-family="'Oswald', 'Arial Narrow', Impact, sans-serif"
        font-size="56" font-weight="700" fill="#f5f5f5" letter-spacing="2">4BJJ</text>
</svg>
